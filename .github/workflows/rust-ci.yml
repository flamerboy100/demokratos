name: Integración Continua - Demokratos Node

# El sistema se activará automáticamente ante cualquier cambio en la rama principal
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Compilación Automatizada Segura
    runs-on: ubuntu-latest

    steps:
    # 1. Copiar el código del repositorio dentro de la máquina virtual de pruebas
    - name: Descargar Código del Repositorio
      uses: actions/checkout@v4

    # 2. Instalar el compilador oficial de Rust más estable
    - name: Configurar Entorno de Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    # 3. Moverse a la carpeta del nodo y compilar verificando el Cargo.toml
    - name: Validar y Compilar Dependencias Criptográficas y P2P
      run: |
        cd src/demokratos-node
        cargo check
        cargo build --verbose
