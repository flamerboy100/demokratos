name: Integración Continua - Demokratos Node

# El sistema se activará automáticamente ante cualquier cambio en la rama principal
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Compilación y Auditoría de Seguridad Automatizada
    runs-on: ubuntu-latest

    steps:
    # 1. Copiar el código del repositorio dentro de la máquina virtual de pruebas
    - name: Descargar Código del Repositorio
      uses: actions/checkout@v4

    # 2. Instalamos el compilador oficial de Rust más estable
    - name: Configurar Entorno de Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    # 3. Moverse a la carpeta del nodo y validar la sintaxis del código
    - name: Validar Dependencias Criptográficas y P2P
      run: |
        cd src/demokratos-node
        cargo check

    # 4. Compilar los binarios del nodo en modo de desarrollo
    - name: Compilar Nodo de Votación
      run: |
        cd src/demokratos-node
        cargo build --verbose

    # 5. EJECUTAR PRUEBAS: Obliga al sistema a validar que los ataques simulados sean rechazados
    - name: Ejecutar Pruebas Automatizadas contra Fraude Electoral
      run: |
        cd src/demokratos-node
        cargo test --verbose
